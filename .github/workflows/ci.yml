name: CI & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-engine-strict || npm install --legacy-peer-deps --no-engine-strict

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run lint:tsc

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-engine-strict || npm install --legacy-peer-deps --no-engine-strict

      - name: Run Vitest Tests
        run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-engine-strict || npm install --legacy-peer-deps --no-engine-strict

      # Asli build step jo dist/ folder generate karega
      - name: Run Vite Build
        run: npm run build

      # Build artifacts ko temporay save karna taake deploy job isay use kar sakay
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build job se dist/ folder wapas pull karna
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Apna actual AWS region yahan likhein (e.g., us-east-1)

      # Asli AWS S3 sync command
      - name: Deploy to S3 Bucket
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete
