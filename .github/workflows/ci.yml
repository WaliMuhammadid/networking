name: CI & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Yeh line GitHub ko batayegi ke commands is folder ke andar chalane hain
defaults:
  run:
    working-directory: Devops-Networking-main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Devops-Networking-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run lint:tsc

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Devops-Networking-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest Tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Devops-Networking-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vite Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Simple placeholder echo step deployment validation ke liye (Sir ko dikhane ke liye ke deploy block chal gaya)
      - name: Mock Deployment FrontEnd Tool
        run: |
          echo "Deploying build artifacts from ./dist to Hosting Service..."
          echo "Deployment successful!"
