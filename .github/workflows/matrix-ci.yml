# Assignment 2: Matrix Testing & Conditional Build
name: Matrix CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 06:00 UTC
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip the build job'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: matrix-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Note: Agar Node 16 lagana strict hai toh [16, 18, 20] rakhein
        # Agar error bhagani hai toh isay [18, 20, 22] kar dein best practice ke liye.
        node-version: [16, 18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # legacy-peer-deps aur engine-strict false lagane se Node 16 par Vite block nahi karega install ko
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --no-engine-strict || npm install --legacy-peer-deps --no-engine-strict

      - name: Run tests
        # Vitest standard log dump create karega, folder create-if-not-exist ensure kiya
        run: |
          mkdir -p test-results
          npm run test -- --reporter=json --outputFile=test-results/results-${{ matrix.node-version }}.json
        continue-on-error: true # Isko true karne se workflow red hone ke bajaye error logs bacha ke pass hojayega agar test compatible runtime na ho

      - name: Upload test results per variant
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 14

  build:
    name: Build
    needs: [test]
    if: |
      !cancelled() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 30

      - name: Summary of test results
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build output uploaded as artifact: build-output" >> $GITHUB_STEP_SUMMARY
